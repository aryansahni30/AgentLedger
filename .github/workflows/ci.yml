name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify committed plugin bundles match source
        run: |
          git diff --exit-code -- packages/plugin/dist \
            || { echo "::error::packages/plugin/dist/*.cjs is stale. Run 'pnpm --filter agentledger-plugin build' and commit the result."; exit 1; }

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
